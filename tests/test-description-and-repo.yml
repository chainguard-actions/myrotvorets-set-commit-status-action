name: Test description and repo inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          token: ${{ github.token }}
          status: failure
          sha: ${{ github.sha }}
          repo: ${{ github.repository }}
          description: "Build failed due to test errors"
          context: "CI / test-description-and-repo"
      - name: Assert action ran without unexpected error
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran (outcome: ${{ steps.action.outcome }})"
