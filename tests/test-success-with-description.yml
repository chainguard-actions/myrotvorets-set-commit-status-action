name: Test success status with description
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          token: ${{ github.token }}
          status: success
          sha: ${{ github.sha }}
          description: "All checks passed"
          context: "test-success-with-description"
        continue-on-error: true
      - name: Assert action ran without unexpected error
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # The action may fail if the token lacks repo:status scope in act,
          # but it should not error due to missing inputs or bad configuration.
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran with description input (outcome=$OUTCOME)"
