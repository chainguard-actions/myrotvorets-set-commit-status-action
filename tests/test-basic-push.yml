name: Test basic push - pending status
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          token: fake-token-for-testing
          status: pending
          sha: aabbccddee1122334455667788990011aabbccdd
          targetUrl: https://example.com/run/1
          context: test-context
      - name: Assert action ran (may fail due to fake token but should not crash)
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          # The action is expected to fail with a fake token (API call will be rejected),
          # but it should not produce an unexpected error type.
          # We just verify the step completed (either success or failure from API).
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran as expected"
