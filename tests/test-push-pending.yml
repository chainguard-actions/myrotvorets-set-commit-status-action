name: Test push pending status
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          token: ${{ github.token }}
          status: pending
          sha: ${{ github.sha }}
          context: "CI / test-push-pending"
          targetUrl: "https://github.com"
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          # The action may fail due to missing permissions in act environment,
          # but it should at least attempt to run (not be skipped)
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran (outcome=${{ steps.action.outcome }})"
