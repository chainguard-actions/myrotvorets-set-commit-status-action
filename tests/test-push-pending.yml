name: Test push pending status
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          token: ${{ github.token }}
          status: pending
          sha: ${{ github.sha }}
          context: "CI / test-push-pending"
          targetUrl: "https://example.com/build/1"
      - name: Assert action ran without unexpected error
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          # The action may fail due to missing GitHub API permissions in act,
          # but it should not fail due to missing/invalid inputs.
          # We accept both success and failure outcomes here since
          # the API call may not work in the act environment.
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran (outcome: ${{ steps.action.outcome }})"
