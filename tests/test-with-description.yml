name: Test with description input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: push
      GITHUB_REF: refs/heads/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          token: fake-token-for-testing
          status: success
          sha: aabbccddee1122334455667788990011aabbccdd
          description: Build succeeded
          context: ci/build
      - name: Assert action ran with description input
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          # The action is expected to fail with a fake token (API call will be rejected),
          # but it should not be skipped.
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran with description input"
